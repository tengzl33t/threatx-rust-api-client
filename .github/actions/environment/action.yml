name: Prepare Rust environment
description: "Rust environment preparation"

runs:
  using: composite
  steps:
    - name: Cache
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Build project
      shell: bash
      run: cargo build
